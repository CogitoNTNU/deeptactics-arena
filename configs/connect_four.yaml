network:
  encoder_type: cnn
  input_shape: [6, 7, 2]
  hidden_shape: 128
  legal_actions: 7
  num_layers: 4
  stem:
    num_residual_blocks: 1
    block_size: 128
  head:
    hidden_blocks: 4
train:
  learning_rate: 0.001
  batch_size: 32
  num_epochs: 10
  num_episodes: 200
  min_replay_size: 16
  num_batches: 10
mcts:
  cpuct: 10
  pi_temp: 1.5
  epsilon: 0.25

env_name: connect_four